services:
  api:
    container_name: api
    build:
      context: ./api
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - 9000:9000
    volumes:
      - ./api/wegia:/var/www/html
    networks:
      - wegia-network
    depends_on:
      - db

  nginx:
    image: nginx:alpine
    container_name: nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./api/wegia:/var/www/html
      - ./api/config/nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - wegia-network
    depends_on:
      - api


  db:
    image: mariadb:10.11
    container_name: db
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: secret
      MYSQL_DATABASE: wegia
      MYSQL_USER: wegiauser
      MYSQL_PASSWORD: senha  
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./db:/docker-entrypoint-initdb.d 
    networks:
      - wegia-network

volumes:
  db_data:

networks:
  wegia-network:
    driver: bridge